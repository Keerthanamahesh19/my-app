<!DOCTYPE html>
<html>
<head>
  <title>DevOps Deployment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #333;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🚀 Automated Deployment System</h1>
    <p>Successfully deployed using CI/CD Pipeline</p>
    <p>Docker + GitHub Actions + Render</p>

    <button onclick="showMessage()">Check Status</button>
  </div>

  <script>
    function showMessage() {
      alert("✅ Deployment Successful!");
    }
  </script>
</body>
</html>
