<!DOCTYPE html>
<html>
<head>
  <title>DevOps Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
      width: 300px;
    }

    .status {
      font-size: 20px;
      margin: 10px 0;
    }

    .success {
      color: #22c55e;
    }

    .time {
      font-size: 14px;
      color: #94a3b8;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🚀 updated Deployment Dashboard</h1>

  <div class="card">
    <div class="status success">✅ Deployment Successful</div>
    <div class="time" id="time"></div>

    <button onclick="refresh()">🔄 Refresh</button>
  </div>

  <script>
    function updateTime() {
      document.getElementById("time").innerText =
        "Last Updated: " + new Date().toLocaleString();
    }

    function refresh() {
      location.reload();
    }

    updateTime();
  </script>

</body>
</html>
